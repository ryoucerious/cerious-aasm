<!-- Update available – prompt user to download -->
<div class="update-banner" *ngIf="!dismissed && updateStatus?.status === 'available'">
  <div class="banner-accent"></div>
  <div class="banner-content">
    <span class="material-icons banner-icon">new_releases</span>
    <span class="banner-text">Update available: <strong>v{{ updateStatus?.version }}</strong></span>
    <button class="action-btn" (click)="downloadUpdate()">Download Update</button>
    <button class="dismiss-btn" (click)="dismiss()" title="Later">
      <span class="material-icons">close</span>
    </button>
  </div>
</div>

<!-- Downloading progress -->
<div class="update-banner" *ngIf="!dismissed && updateStatus?.status === 'downloading'">
  <div class="banner-accent"></div>
  <div class="banner-content">
    <span class="material-icons banner-icon">cloud_download</span>
    <span class="banner-text">Downloading update… {{ downloadPercent }}%</span>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" [style.width.%]="downloadPercent"></div>
    </div>
    <button class="dismiss-btn" (click)="dismiss()" title="Dismiss">
      <span class="material-icons">close</span>
    </button>
  </div>
</div>

<!-- Update downloaded – prompt to restart -->
<div class="update-banner" *ngIf="!dismissed && updateStatus?.status === 'downloaded'">
  <div class="banner-accent ready"></div>
  <div class="banner-content">
    <span class="material-icons banner-icon">update</span>
    <span class="banner-text">Update <strong>v{{ updateStatus?.version }}</strong> downloaded &mdash; ready to install.</span>
    <button class="action-btn" (click)="installUpdate()">Restart to Update</button>
    <button class="dismiss-btn" (click)="dismiss()" title="Later">
      <span class="material-icons">close</span>
    </button>
  </div>
</div>

<!-- Download error -->
<div class="update-banner error" *ngIf="!dismissed && updateStatus?.status === 'error'">
  <div class="banner-accent error"></div>
  <div class="banner-content">
    <span class="material-icons banner-icon">error_outline</span>
    <span class="banner-text">Update failed: {{ updateStatus?.error || 'Unknown error' }}</span>
    <button class="action-btn" (click)="retryDownload()">Retry</button>
    <button class="dismiss-btn" (click)="dismiss()" title="Dismiss">
      <span class="material-icons">close</span>
    </button>
  </div>
</div>
